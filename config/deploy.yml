service: bkk2026-election
image: japman/bkk-election-2026  # Kamal จะเติม registry.server (ghcr.io) ให้เอง → ghcr.io/japman/bkk-election-2026 (อย่าใส่ ghcr.io ซ้ำ)

servers:
  web:
    hosts:
      - 159.138.241.201

proxy:
  # Cloudflare เป็นตัว terminate SSL (Full strict) → ใช้ Cloudflare Origin Certificate แทน Let's Encrypt
  ssl:
    certificate_pem: CF_ORIGIN_CERT      # ใส่ใน .kamal/secrets (เนื้อ cert จาก Cloudflare > SSL/TLS > Origin Server)
    private_key_pem: CF_ORIGIN_KEY        # ใส่ใน .kamal/secrets (private key คู่กับ cert)
  host: bkk-election-2026.dailynews.co.th
  forward_headers: true                   # ให้ X-Forwarded-* จาก Cloudflare ส่งต่อถึง Rails (client IP จริง)

registry:
  server: ghcr.io
  username: admin-uat
  password:
    - KAMAL_REGISTRY_PASSWORD      # GitHub PAT scope write:packages — ใส่ใน .kamal/secrets

builder:
  arch: amd64
  # build บน server โดยตรง (amd64 native — เร็ว ไม่ต้อง emulate) แทน build บน Mac arm64
  # เลี่ยงปัญหา Rancher Desktop buildkit resolve ghcr.io DNS ไม่ได้
  remote: ssh://root@159.138.241.201
  local: false

env:
  clear:
    SOLID_QUEUE_IN_PUMA: "1"
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
    - REDIS_URL
    - ECT_API_URL
    - SNAPSHOT_BUCKET
    - PUBLIC_ORIGIN
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY

# UAT ไม่มี RDS: Kamal รัน Postgres + Redis บน server เดียวกัน
# app เชื่อมผ่าน network "kamal" ด้วยชื่อ container: bkk2026-election-db / bkk2026-election-redis
# (DATABASE_URL/REDIS_URL ประกอบไว้ใน .kamal/secrets แล้ว ไม่ publish port ออกนอก = ปลอดภัย)
accessories:
  db:
    image: postgres:17
    host: 159.138.241.201
    env:
      clear:
        POSTGRES_USER: bkk2026
        POSTGRES_DB: bkk2026_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
  redis:
    image: redis:7
    host: 159.138.241.201
    cmd: redis-server --appendonly yes
    directories:
      - data:/data
