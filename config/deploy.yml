service: bkk2026-election
image: japman/bkk-election-2026  # Kamal จะเติม registry.server (ghcr.io) ให้เอง → ghcr.io/japman/bkk-election-2026 (อย่าใส่ ghcr.io ซ้ำ)

servers:
  web:
    hosts:
      - 159.138.255.93
    # FD limit (nofile) สำหรับ 6000 WS ตั้งใน bin/docker-entrypoint (ulimit -n) — เชื่อถือได้กว่า Kamal options

proxy:
  # Cloudflare เป็นตัว terminate SSL (Full strict) → ใช้ Cloudflare Origin Certificate แทน Let's Encrypt
  ssl:
    certificate_pem: CF_ORIGIN_CERT      # ใส่ใน .kamal/secrets (เนื้อ cert จาก Cloudflare > SSL/TLS > Origin Server)
    private_key_pem: CF_ORIGIN_KEY        # ใส่ใน .kamal/secrets (private key คู่กับ cert)
  host: bkk-election-2026.dailynews.co.th
  forward_headers: true                   # ให้ X-Forwarded-* จาก Cloudflare ส่งต่อถึง Rails (client IP จริง)

registry:
  server: ghcr.io
  username: admin-uat
  password:
    - KAMAL_REGISTRY_PASSWORD      # GitHub PAT scope write:packages — ใส่ใน .kamal/secrets

builder:
  arch: amd64

env:
  clear:
    SOLID_QUEUE_IN_PUMA: "1"
    AWS_REGION: ap-southeast-1   # S3 bucket bkk-election-2026 region (SnapshotPublisher → S3)
    # ⚠️ sized for 8 vCPU / 16 GB — deploy หลัง resize box เท่านั้น (อย่าใส่ลง box เล็ก)
    WEB_CONCURRENCY: "5"          # Puma workers (เหลือ ~3 core ให้ PG/Redis/SolidQueue/OS)
    RAILS_MAX_THREADS: "5"        # threads/worker (I/O-bound) + DB pool size
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
    - REDIS_URL
    - ECT_API_URL
    - ECT_API_TOKENS
    - SNAPSHOT_BUCKET
    - SNAPSHOT_CDN_URL
    - PUBLIC_ORIGIN
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY

# UAT ไม่มี RDS: Kamal รัน Postgres + Redis บน server เดียวกัน
# app เชื่อมผ่าน network "kamal" ด้วยชื่อ container: bkk2026-election-db / bkk2026-election-redis
# (DATABASE_URL/REDIS_URL ประกอบไว้ใน .kamal/secrets แล้ว ไม่ publish port ออกนอก = ปลอดภัย)
accessories:
  db:
    image: postgres:17
    host: 159.138.255.93
    # ⚠️ sized for 16 GB box — deploy หลัง resize เท่านั้น (shared_buffers 2GB จะ OOM บน box 3.4GB)
    cmd: postgres -c shared_buffers=2GB -c effective_cache_size=6GB -c work_mem=8MB -c maintenance_work_mem=256MB
    env:
      clear:
        POSTGRES_USER: bkk2026
        POSTGRES_DB: bkk2026_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
  redis:
    image: redis:7
    host: 159.138.255.93
    # ActionCable pub/sub (ephemeral) — ปิด AOF ลด disk I/O + maxmemory safety cap
    cmd: redis-server --appendonly no --maxmemory 1gb --maxmemory-policy allkeys-lru
    directories:
      - data:/data
