production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  # ดึงผลคะแนนจาก API พาร์ทเนอร์ทุก 30 วินาที
  ingest_poll:
    class: IngestPollJob
    args: [ "governor" ]
    queue: default
    schedule: every 30 seconds

  ingest_poll_council:
    class: IngestPollJob
    args: [ "council" ]
    schedule: every 30 seconds

development:
  # ingest_poll ไม่รันใน dev โดย default (ไม่มี ECT_API_URL จะ fail ทุก 30 วิ)
  # ทดสอบ pipeline: ตั้ง ECT_API_URL ชี้ mock server แล้ว copy block จาก production มาใส่
