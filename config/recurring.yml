# examples:
#   periodic_cleanup:
#     class: CleanSoftDeletedRecordsJob
#     queue: background
#     args: [ 1000, { batch_size: 500 } ]
#     schedule: every hour
#   periodic_cleanup_with_command:
#     command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
#     priority: 2
#     schedule: at 5am every day

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  # ดึงผลคะแนนจาก API พาร์ทเนอร์ทุก 30 วินาที
  ingest_poll:
    class: IngestPollJob
    queue: default
    schedule: every 30 seconds

development:
  # dev ไม่มี ECT_API_URL → job raise KeyError ใน Client ตอน ENV.fetch
  # ซึ่งไม่ใช่ FetchError เลยไม่ retry — แค่ log error ใน Solid Queue, ไม่กระทบเว็บ
  ingest_poll:
    class: IngestPollJob
    queue: default
    schedule: every 30 seconds
